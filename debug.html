<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; base-uri 'none'; form-action 'none'; object-src 'none'; frame-src 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c0e14">
<title>Debug — Plex jqh omv</title>
<link rel="icon" href="icon-192-v3.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c0e14;--surface:#161a25;--border:#252a3a;--text:#e4e6ef;--text-dim:#6b7194;--accent:#7c6aef;--green:#34d399;--red:#f87171}
  *{margin:0;padding:0;box-sizing:border-box}
  html{height:100%}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100%;min-height:100dvh;padding:24px 16px;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(40px,env(safe-area-inset-bottom));line-height:1.5}
  .page{max-width:560px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
  header{text-align:center;padding:8px 0 4px}
  header h1{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
  header p{font-size:13px;color:var(--text-dim);max-width:42ch;margin:0 auto}
  section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px}
  section h2{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
  dl{display:grid;grid-template-columns:auto 1fr;gap:6px 12px;font-size:13px}
  dt{color:var(--text-dim);font-weight:500}
  dd{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);word-break:break-all}
  dd.ok{color:var(--green)}
  dd.warn{color:var(--red)}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-size:13px;padding:8px 0;align-self:flex-start}
  .back:active{opacity:.7}
  footer{margin-top:8px;font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;opacity:.5;text-align:center}
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>Debug</h1>
    <p>Instantané utile pour diagnostiquer un problème (à partager à l'admin si demandé).</p>
  </header>

  <section>
    <h2>Version</h2>
    <dl>
      <dt>App</dt><dd id="appVersion">—</dd>
      <dt>SW cache</dt><dd id="swCache">—</dd>
      <dt>SW state</dt><dd id="swState">—</dd>
    </dl>
  </section>

  <section>
    <h2>Config</h2>
    <dl>
      <dt>Host</dt><dd id="cfgHost">—</dd>
      <dt>MAC</dt><dd id="cfgMac">—</dd>
      <dt>Port</dt><dd id="cfgPort">—</dd>
      <dt>Apps</dt><dd id="cfgApps">—</dd>
    </dl>
  </section>

  <section>
    <h2>Réseau</h2>
    <dl>
      <dt>navigator.onLine</dt><dd id="navOnline">—</dd>
      <dt>Display mode</dt><dd id="displayMode">—</dd>
      <dt>Viewport</dt><dd id="viewport">—</dd>
      <dt>Lang</dt><dd id="lang">—</dd>
      <dt>UA</dt><dd id="ua">—</dd>
    </dl>
  </section>

  <a class="back" href="./">← Retour à l'app</a>
</div>

<script src="debug.js"></script>
</body>
</html>
